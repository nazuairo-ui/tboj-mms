{% extends "base.html" %}

{% block title %}Daftar Tiket — Kajian Offline MMS 2026{% endblock %}

{% block content %}

<style>
    .lily-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .lily-svg {
        animation: goyang 3s ease-in-out infinite;
        transform-origin: center bottom;
    }

    @keyframes goyang {

        0%,
        100% {
            transform: rotate(-2deg);
        }

        50% {
            transform: rotate(2deg);
        }
    }
</style>

<div class="lily-wrap">
    <svg class="lily-svg" viewBox="0 0 480 520" xmlns="http://www.w3.org/2000/svg"
        style="width:420px;height:420px;filter:drop-shadow(0 40px 80px rgba(0,0,0,0.4));">
        <defs>
            <radialGradient id="petalG1" cx="50%" cy="80%" r="60%">
                <stop offset="0%" stop-color="#f8e8f0" />
                <stop offset="40%" stop-color="#e8a0c0" />
                <stop offset="100%" stop-color="#b05070" />
            </radialGradient>
            <radialGradient id="petalG2" cx="50%" cy="80%" r="60%">
                <stop offset="0%" stop-color="#f5e0ec" />
                <stop offset="40%" stop-color="#d490b0" />
                <stop offset="100%" stop-color="#903060" />
            </radialGradient>
            <radialGradient id="centerG" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f8e840" />
                <stop offset="60%" stop-color="#d4a020" />
                <stop offset="100%" stop-color="#a07010" />
            </radialGradient>
        </defs>

        <!-- Batang -->
        <path d="M240 510 Q238 430 240 300" stroke="#3a6a30" stroke-width="6" fill="none" stroke-linecap="round" />

        <!-- Daun kiri -->
        <path d="M239 420 Q195 395 178 365 Q210 378 239 415" fill="#4a8a3a" opacity="0.85" />
        <!-- Daun kanan -->
        <path d="M241 450 Q290 420 305 388 Q272 405 241 445" fill="#4a8a3a" opacity="0.85" />

        <!-- Kelopak belakang -->
        <g opacity="0.7">
            <ellipse cx="240" cy="180" rx="32" ry="95" fill="url(#petalG2)" transform="rotate(-60 240 300)" />
            <ellipse cx="240" cy="180" rx="32" ry="95" fill="url(#petalG2)" transform="rotate(60 240 300)" />
            <ellipse cx="240" cy="180" rx="32" ry="95" fill="url(#petalG2)" transform="rotate(180 240 300)" />
        </g>

        <!-- Kelopak depan -->
        <ellipse cx="240" cy="178" rx="34" ry="100" fill="url(#petalG1)" transform="rotate(0 240 300)" />
        <ellipse cx="240" cy="178" rx="34" ry="100" fill="url(#petalG1)" transform="rotate(120 240 300)" />
        <ellipse cx="240" cy="178" rx="34" ry="100" fill="url(#petalG1)" transform="rotate(240 240 300)" />

        <!-- Bintik -->
        <g opacity="0.5">
            <circle cx="240" cy="210" r="4" fill="#7a2040" />
            <circle cx="228" cy="228" r="3" fill="#7a2040" />
            <circle cx="252" cy="225" r="3" fill="#7a2040" />
            <circle cx="235" cy="245" r="2.5" fill="#7a2040" />
            <circle cx="248" cy="243" r="2" fill="#7a2040" />
        </g>

        <!-- Serbuk sari -->
        <g>
            <line x1="240" y1="300" x2="220" y2="235" stroke="#8a6020" stroke-width="1.5" />
            <line x1="240" y1="300" x2="255" y2="232" stroke="#8a6020" stroke-width="1.5" />
            <line x1="240" y1="300" x2="240" y2="225" stroke="#8a6020" stroke-width="1.5" />
            <line x1="240" y1="300" x2="228" y2="255" stroke="#8a6020" stroke-width="1.5" />
            <line x1="240" y1="300" x2="252" y2="255" stroke="#8a6020" stroke-width="1.5" />
            <line x1="240" y1="300" x2="240" y2="260" stroke="#8a6020" stroke-width="1.5" />
            <ellipse cx="220" cy="233" rx="5" ry="3" fill="#c8a030" transform="rotate(-20 220 233)" />
            <ellipse cx="255" cy="230" rx="5" ry="3" fill="#c8a030" transform="rotate(20 255 230)" />
            <ellipse cx="240" cy="223" rx="5" ry="3" fill="#c8a030" />
            <ellipse cx="228" cy="253" rx="4" ry="2.5" fill="#d4a820" transform="rotate(-10 228 253)" />
            <ellipse cx="252" cy="253" rx="4" ry="2.5" fill="#d4a820" transform="rotate(10 252 253)" />
            <ellipse cx="240" cy="258" rx="4" ry="2.5" fill="#d4a820" />
        </g>

        <!-- Inti -->
        <circle cx="240" cy="300" r="14" fill="url(#centerG)" />
        <circle cx="240" cy="300" r="7" fill="#e8c040" opacity="0.6" />
    </svg>
</div>

{% endblock %}
